<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Oasis of Hope - Story</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="icon" type="image/x-icon" href="assets/images/hero/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#49ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#152210",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="flex flex-col min-h-screen">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <a href="index.html" class="flex items-center gap-2">
                        <img src="assets/images/hero/logo.png" alt="Oasis of Hope Logo" class="w-8 h-8 rounded-lg" />
                    </a>
                    <nav class="hidden md:flex space-x-8 text-sm font-medium">
                        <a class="text-slate-600 hover:text-primary transition-colors" href="index.html">Home</a>
                        <a class="text-slate-600 hover:text-primary transition-colors" href="programs.html">Programs</a>
                        <a class="text-slate-600 hover:text-primary transition-colors" href="team.html">About</a>
                        <a class="text-slate-600 hover:text-primary transition-colors" href="updates.html">Updates</a>
                    </nav>
                    <div id="auth-nav"></div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 pb-20">
            <div id="loadingState" class="max-w-4xl mx-auto px-4 py-20 text-center">
                <div class="size-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-slate-500 font-bold uppercase tracking-widest text-xs">Loading story...</p>
            </div>

            <article id="storyContent" class="hidden">
                <!-- Hero Image -->
                <div class="relative h-96 w-full">
                    <img id="storyImage" src="" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-background-light dark:from-background-dark to-transparent"></div>
                </div>

                <div class="max-w-4xl mx-auto px-4 -mt-32 relative z-10">
                    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl p-8 md:p-12 border border-primary/5">
                        <div class="flex items-center gap-4 mb-6">
                            <span id="storyCategory" class="px-3 py-1 rounded-full bg-primary/20 text-slate-700 dark:text-slate-300 text-xs font-black uppercase tracking-wider"></span>
                            <span id="storyDate" class="text-slate-400 text-xs font-bold uppercase tracking-widest"></span>
                        </div>

                        <h1 id="storyTitle" class="text-3xl md:text-5xl font-black text-slate-900 dark:text-white mb-8 leading-tight"></h1>
                        
                        <div id="storyBody" class="prose prose-slate dark:prose-invert max-w-none text-slate-600 dark:text-slate-400 text-lg leading-relaxed space-y-6">
                            <!-- Story text will be injected here -->
                        </div>

                        <div class="mt-12 pt-8 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
                            <a href="index.html" class="flex items-center gap-2 text-primary font-bold hover:underline">
                                <span class="material-symbols-outlined">arrow_back</span> Back to Home
                            </a>
                            <div class="flex gap-4">
                                <button class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-primary transition-colors hover:text-white text-slate-500">
                                    <span class="material-symbols-outlined">share</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </article>

            <div id="errorState" class="hidden max-w-4xl mx-auto px-4 py-20 text-center">
                <span class="material-symbols-outlined text-red-500 text-6xl mb-4">error</span>
                <h2 class="text-2xl font-bold mb-2">Story not found</h2>
                <p class="text-slate-500 mb-8">The story you are looking for may have been moved or removed.</p>
                <a href="index.html" class="bg-primary text-slate-900 px-8 py-3 rounded-full font-bold">Return Home</a>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-background-dark text-slate-300 py-12 border-t border-white/5">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-xs font-medium text-slate-500">© 2024 Oasis of Hope Initiatives. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                showError();
                return;
            }

            // Wait for RemoteDB
            let retries = 0;
            while ((!window.RemoteDB || !window.RemoteDB.available) && retries < 50) {
                await new Promise(r => setTimeout(r, 100));
                retries++;
            }

            try {
                const story = await window.RemoteDB.getStory(id);
                if (!story) {
                    showError();
                    return;
                }

                renderStory(story);
            } catch (err) {
                console.error('Error loading story:', err);
                showError();
            }
        });

        function renderStory(story) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('storyContent').classList.remove('hidden');

            document.getElementById('storyImage').src = story.image_url || 'assets/images/projects/general.jpg';
            document.getElementById('storyCategory').textContent = story.category;
            document.getElementById('storyDate').textContent = new Date(story.created_at).toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric' 
            });
            document.getElementById('storyTitle').textContent = story.title;
            
            // Simple markdown-ish line break handling
            const body = story.content
                .split('\n\n')
                .map(p => p.trim())
                .filter(p => p.length > 0)
                .map(p => `<p class="mb-4">${p.replace(/\n/g, '<br>')}</p>`)
                .join('');
            
            document.getElementById('storyBody').innerHTML = body;
            document.title = `${story.title} | Oasis of Hope`;
        }

        function showError() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
        }
    </script>
</body>
</html>
