<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>404 - Page Not Found | Oasis of Hope</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="icon" type="image/x-icon" href="assets/images/hero/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#49ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#152210",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full text-center space-y-8">
        <div class="relative inline-block">
            <span class="text-[120px] font-black text-primary/10 select-none">404</span>
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="material-symbols-outlined text-7xl text-primary animate-pulse">location_off</span>
            </div>
        </div>

        <div class="space-y-4">
            <h1 class="text-3xl font-bold tracking-tight">Lost in the Oasis?</h1>
            <p class="text-slate-500 dark:text-slate-400">
                The page you are looking for doesn't exist or has been moved. Let's get you back to safety.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center pt-4">
            <a href="index.html"
                class="bg-primary text-slate-900 font-bold px-8 py-3 rounded-xl hover:shadow-lg hover:shadow-primary/20 transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">home</span>
                Back Home
            </a>
            <a href="contact.html"
                class="border border-primary/20 hover:bg-primary/5 font-bold px-8 py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">support_agent</span>
                Contact Support
            </a>
        </div>

        <div class="pt-12">
            <div class="flex items-center justify-center gap-2 opacity-50">
                <img src="assets/images/hero/logo.png" alt="Oasis Logo" class="w-6 h-6 rounded-md" />
            </div>
        </div>
    </div>
</body>

</html>
