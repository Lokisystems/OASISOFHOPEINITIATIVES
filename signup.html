<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Join Oasis of Hope - Sign Up</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="icon" type="image/x-icon" href="assets/images/hero/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#49ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#152210",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <div
        class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
        <div class="max-w-md mx-auto w-full flex flex-col min-h-screen">
            <!-- Header -->
            <div class="flex items-center bg-transparent p-4 pb-2 justify-between">
                <div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
                    <a href="index.html"
                        class="material-symbols-outlined cursor-pointer text-slate-900 dark:text-slate-100"
                        style="font-size: 24px; text-decoration: none;">arrow_back</a>
                </div>
                <a href="index.html" class="flex items-center gap-2 group decoration-none flex-1 justify-center pr-12">
                    <img src="assets/images/hero/logo.png" alt="Oasis of Hope Logo" class="w-8 h-8 rounded-lg" />
                </a>
            </div>
            <!-- Hero Section -->
            <div class="@container">
                <div class="@[480px]:px-4 @[480px]:py-3">
                    <div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-slate-200 dark:bg-slate-800 @[480px]:rounded-lg min-h-[200px]"
                        data-alt="Community members collaborating"
                        style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBdkoR7bhTkYoDYRmnIpLQkuVfJbS4vTu2FKFHoGNsGAzfOOBl8UlMKEvdha0Rjv5-p0Vc0LX3UTWeewHrlXR5GEg48qy8OxHMqpMSn_EOdDLh-slND8Nz7SGZH4cAjEcoYAnkW7p9PCJPEJEuIHwqYqjG93RNrhZHrpA-JcKeskIcAdiHoNN94k-7BLCsnqpGGDsrrOGVo5iHGBOw7TDEkwc18PQjxfDOXRtX6w8vqhfIGknme_g0j8qDvQk5uZUx3iDenFGO5dkVI");'>
                    </div>
                </div>
            </div>
            <div class="px-4 text-center">
                <h1
                    class="text-slate-900 dark:text-slate-100 tracking-light text-[28px] font-bold leading-tight pb-2 pt-6">
                    Join Us Today</h1>
                <p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-4">Start your
                    journey
                    with the Oasis of Hope community.</p>
            </div>

            <!-- Sign Up Form -->
            <div class="flex flex-col gap-4 px-4 pt-4 pb-6">
                <!-- Profile Photo Upload -->
                <div class="flex flex-col items-center gap-3 mb-4">
                    <div class="relative group">
                        <div id="signup-avatar-container"
                            class="size-24 rounded-full border-4 border-slate-100 dark:border-slate-800 overflow-hidden bg-slate-100 dark:bg-slate-800 ring-2 ring-primary/20 shadow-xl flex items-center justify-center">
                            <img id="signup-avatar-preview" src=""
                                class="hidden w-full h-full object-cover">
                            <span id="signup-avatar-placeholder" class="material-symbols-outlined text-slate-400 text-5xl">person</span>
                        </div>
                        <label for="avatar-upload"
                            class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity">
                            <span class="material-symbols-outlined text-white text-3xl">photo_camera</span>
                            <input type="file" id="avatar-upload" class="hidden" accept="image/*"
                                onchange="previewAvatar(event)">
                        </label>
                    </div>
                    <p
                        class="text-[10px] text-primary font-black uppercase tracking-widest bg-primary/10 px-3 py-1 rounded-full">
                        Upload Profile Photo</p>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 px-1">Full Name</label>
                    <input id="signup-fullname"
                        class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                        placeholder="John Doe" type="text" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 px-1">Username</label>
                    <input id="signup-username"
                        class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                        placeholder="johndoe123" type="text" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 px-1">Email Address</label>
                    <input id="signup-email"
                        class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                        placeholder="hello@oasis.org" type="email" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 px-1">Password</label>
                    <div class="relative">
                        <input id="signup-password"
                            class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                            placeholder="••••••••" type="password" />
                        <span
                            class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer"
                            id="toggle-password" style="font-size: 20px;">visibility_off</span>
                    </div>
                </div>
                <button id="signup-btn"
                    class="w-full bg-primary text-slate-900 font-bold py-3.5 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all mt-2">
                    Create Account
                </button>
            </div>
            <!-- Social Login Divider -->
            <div class="flex items-center gap-4 px-4 py-2">
                <div class="h-px grow bg-slate-200 dark:bg-slate-800"></div>
                <span class="text-xs font-medium text-slate-400 uppercase tracking-widest">or sign up with</span>
                <div class="h-px grow bg-slate-200 dark:bg-slate-800"></div>
            </div>
            <!-- Social Buttons -->
            <div class="px-4 py-4">
                <button id="google-signup-btn" onclick="Auth.socialLogin('google')"
                    class="w-full flex items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-slate-700 py-3 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                    <svg class="w-5 h-5" viewbox="0 0 24 24">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4"></path>
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853"></path>
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05"></path>
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335"></path>
                    </svg>
                    <span class="text-sm font-semibold">Sign up with Google</span>
                </button>
            </div>
            <!-- Footer Call to Action -->
            <div class="mt-auto px-4 py-8 text-center">
                <p class="text-slate-600 dark:text-slate-400 text-sm">
                    Already have an account?
                    <a class="text-primary font-bold ml-1 hover:underline" href="login.html">Sign In</a>
                </p>
            </div>
            <!-- Bottom Decoration -->
            <div class="h-2 w-full bg-gradient-to-r from-primary/10 via-primary to-primary/10"></div>
        </div>
    </div>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/auth.js"></script>

    <script>
        let uploadedAvatarUrl = null;
        let avatarUploadPromise = null;

        async function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('signup-avatar-preview');
                    const placeholder = document.getElementById('signup-avatar-placeholder');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);

                // Start pre-uploading immediately for 1s target
                console.log('[Signup] Pre-uploading avatar...');
                avatarUploadPromise = window.RemoteDB.uploadMedia([file], { maxWidth: 300, quality: 0.7 }).then(urls => {
                    if (urls.length > 0) uploadedAvatarUrl = urls[0];
                    return urls[0];
                });
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Page loaded, initializing Auth...');
            try {
                if (typeof Auth === 'undefined') {
                    alert('Critical: Auth script failed to load. Check console for errors.');
                    return;
                }
                // Auth auto-initializes in auth.js
                console.log('Auth logic ready');
            } catch (e) {
                console.error('Auth initialization error', e);
                alert('Auth initialization error: ' + e.message);
            }

            const signupBtn = document.getElementById('signup-btn');
            const fullnameInput = document.getElementById('signup-fullname');
            const usernameInput = document.getElementById('signup-username');
            const emailInput = document.getElementById('signup-email');
            const passwordInput = document.getElementById('signup-password');
            const togglePassword = document.getElementById('toggle-password');

            if (togglePassword) {
                togglePassword.onclick = () => {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    togglePassword.textContent = type === 'password' ? 'visibility_off' : 'visibility';
                };
            }

            signupBtn.onclick = async () => {
                const fullName = fullnameInput.value.trim();
                const username = usernameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!fullName || !username || !email || !password) {
                    alert('Please fill in all fields.');
                    return;
                }

                if (password.length < 6) {
                    alert('Password must be at least 6 characters long.');
                    return;
                }

                signupBtn.disabled = true;
                signupBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">sync</span> Syncing...';

                try {
                    // Finalize avatar upload if not done
                    if (avatarUploadPromise) {
                        await avatarUploadPromise;
                    }

                    const result = await Auth.register({
                        fullName,
                        username,
                        email,
                        password,
                        avatarUrl: uploadedAvatarUrl
                    });

                    if (result.success) {
                        alert('Registration successful! Please sign in.');
                        window.location.href = 'login.html';
                    } else {
                        alert('Registration failed: ' + result.message);
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    alert('An unexpected error occurred. Please try again.');
                } finally {
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'Create Account';
                }
            };
        });
    </script>
</body>

</html>
